{% extends 'learning_logs/base.html' %}

{% block content %}
<div class="container">
    <h1 class="my-4">Your Topics</h1>
    <ul class="list-group">
        {% for topic in topics %}
        <li class="list-group-item">
            <a href="{% url 'learning_logs:topic' topic.id %}">{{ topic.text }}</a>
        </li>
        {% empty %}
        <p>No topics have been added yet.</p>
        {% endfor %}
    </ul>
    <a href="{% url 'learning_logs:new_topic' %}" class="btn btn-primary mt-4">Add Topic</a>
</div>
{% endblock %}
